<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none">
  <!-- Stylized K - clean and simple -->
  <g transform="translate(10, 10)">
    <!-- Vertical bar -->
    <path d="M20 80 L20 5"
          stroke="#0D9488"
          stroke-width="5"
          stroke-linecap="round"/>

    <!-- Upper arm -->
    <path d="M20 45 L45 5"
          stroke="#0D9488"
          stroke-width="5"
          stroke-linecap="round"/>

    <!-- Lower arm -->
    <path d="M20 45 L45 80"
          stroke="#0D9488"
          stroke-width="5"
          stroke-linecap="round"/>
  </g>

  <!-- Text: KYKOS -->
  <text x="75" y="62"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="48"
        font-weight="300"
        letter-spacing="8"
        fill="#1E293B">
    KYKOS
  </text>

  <!-- Tagline -->
  <text x="77" y="82"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10"
        font-weight="300"
        letter-spacing="4"
        fill="#64748B">
    DONA CON DIGNITÀ
  </text>
</svg>
